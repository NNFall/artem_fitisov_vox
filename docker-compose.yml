services:
  artem-fitisov-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artem-fitisov-backend
    working_dir: /app/backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app/backend
    ports:
      - "8001:8000"
    restart: unless-stopped
